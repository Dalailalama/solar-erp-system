{% extends 'base.html' %}
{% load static %}
{% load django_vite %}

{% block title %}User Management - ERP System{% endblock %}

{% block content %}
<div id="user-list-app">
    <div class="content-header">
        <h1>User Management</h1>
        <p class="text-muted">Manage system users and their permissions</p>
    </div>

    <div class="card">
        <div class="card-body">
            <!-- Vue App Mount Point -->
            <div id="user-list-container"></div>
        </div>
    </div>
</div>
{% endblock %}


{% block extra_js %}
{% vite_asset 'user_list' %}
{% endblock %}
