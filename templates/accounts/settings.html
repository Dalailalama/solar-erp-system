{% extends 'base.html' %}
{% load static %}
{% load django_vite %}

{% block title %}Settings - ERP System{% endblock %}

{% block content %}
<div id="settings-app">
    <div class="content-header">
        <h1>Account Settings</h1>
        <p class="text-muted">Manage your profile and application preferences</p>
    </div>

    <div class="card">
        <div class="card-body">
            <!-- Vue App Mount Point -->
            <div id="settings-container"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
{% vite_asset 'settings' %}
{% endblock %}
