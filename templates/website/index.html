{% extends 'base.html' %}
{% load static %}

{% block title %}Welcome to ERP System{% endblock %}

{% block extra_css %}
<style>
    .website-hero {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        text-align: center;
    }

    .hero-title {
        font-size: 3.5rem;
        font-weight: 800;
        margin-bottom: 1rem;
    }

    .hero-subtitle {
        font-size: 1.5rem;
        opacity: 0.9;
        margin-bottom: 2rem;
    }

    .cta-button {
        padding: 1rem 2rem;
        background: white;
        color: #764ba2;
        text-decoration: none;
        border-radius: 50px;
        font-weight: 600;
        transition: transform 0.2s;
    }

    .cta-button:hover {
        transform: translateY(-2px);
    }
</style>
{% endblock %}

{% block content %}
<div class="website-hero">
    <h1 class="hero-title">Next Gen ERP</h1>
    <p class="hero-subtitle">Manage your business with clarity and precision.</p>
    <div>
        <a href="{% url 'accounts:login' %}" class="cta-button">
            <i class="fas fa-sign-in-alt"></i> Login to Dashboard
        </a>
    </div>
</div>
{% endblock %}

{% block vue_entry %}
<!-- Disable SPA for public site -->
{% endblock %}
