services:
  web:
    build: .
    container_name: solar_web
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped
    volumes:
      - media_data:/app/media

  db:
    image: postgres:15-alpine
    container_name: solar_db
    environment:
      - POSTGRES_USER=ultrarays_user
      - POSTGRES_PASSWORD=UltrabuildPasshaha890
      - POSTGRES_DB=ultrarays_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
